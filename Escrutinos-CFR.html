<!DOCTYPE html>
<html>
<head>
    <title>Frayle Assembly Voting System</title>
</head>
<body>
    <h1>Voting and Attendance System for Assembly 2026</h1>
    <div id="voting-section">
        <h2>Vote Here</h2>
        <form>
            <label for="vote">Select your option:</label>
            <select id="vote" name="vote">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
            <button type="submit">Submit Vote</button>
        </form>
    </div>
    <div id="attendance-section">
        <h2>Attendance</h2>
        <form>
            <label for="attendee-name">Your Name:</label>
            <input type="text" id="attendee-name" name="attendee-name" required>
            <button type="submit">Mark Attendance</button>
        </form>
    </div>
</body>
</html>
